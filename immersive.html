<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SIA — Immersive (mock)</title>
    <style>
      /* Immersive mode is a vibe mockup: self-contained on purpose, no
         styles.css coupling until the direction is locked. */
      :root {
        --void: #05060e;
        --ink-dim: #6b7ba4;
        --ink: #c9d6ff;
        --ink-bright: #eaf6ff;
        --grid: #2de2ff;
        --heat: #ff2f6d;
        --crowd: #ff9e3d;
        --gather: #8b5cff;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; overflow: hidden; }

      body {
        background: var(--void);
        color: var(--ink);
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        -webkit-font-smoothing: antialiased;
      }

      #scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ——— atmosphere overlays ——— */
      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 120% 90% at 50% 45%, transparent 55%, rgba(3, 4, 10, 0.85) 100%);
      }
      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(180, 220, 255, 0.016) 0px,
          rgba(180, 220, 255, 0.016) 1px,
          transparent 1px,
          transparent 4px
        );
        mix-blend-mode: screen;
      }

      /* ——— HUD chrome ——— */
      .hud {
        position: fixed;
        z-index: 4;
        letter-spacing: 0.22em;
        font-size: 11px;
        text-transform: uppercase;
        user-select: none;
      }
      .hud-tl { top: max(18px, env(safe-area-inset-top)); left: max(22px, env(safe-area-inset-left)); }
      .hud-tr { top: max(18px, env(safe-area-inset-top)); right: max(22px, env(safe-area-inset-right)); text-align: right; }

      .wordmark {
        color: var(--ink-bright);
        font-size: 18px;
        letter-spacing: 0.5em;
        text-shadow: 0 0 18px rgba(45, 226, 255, 0.55);
      }
      .hud .sub { margin-top: 6px; color: var(--ink-dim); font-size: 10px; }
      .hud a {
        color: var(--ink-dim);
        text-decoration: none;
        border-bottom: 1px solid rgba(107, 123, 164, 0.4);
        padding-bottom: 1px;
      }
      .hud a:hover, .hud a:focus-visible { color: var(--ink-bright); outline: none; border-color: var(--ink-bright); }

      #clock { color: var(--ink-bright); font-size: 15px; letter-spacing: 0.3em; }

      /* ——— cloud indicators: real buttons, projected onto the scene ——— */
      .indicator {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 3;
        width: 34px;
        height: 34px;
        margin: -17px 0 0 -17px; /* center on projected point */
        background: none;
        border: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .indicator .diamond {
        position: absolute;
        inset: 10px;
        transform: rotate(45deg);
        border: 1.5px solid var(--tint);
        background: color-mix(in srgb, var(--tint) 18%, transparent);
        box-shadow: 0 0 10px color-mix(in srgb, var(--tint) 70%, transparent);
        transition: inset 140ms ease;
      }
      .indicator .ring {
        position: absolute;
        inset: 0;
        border: 1px solid var(--tint);
        transform: rotate(45deg);
        opacity: 0;
        animation: ping 2.6s ease-out infinite;
        animation-delay: var(--phase);
      }
      .indicator:hover .diamond,
      .indicator:focus-visible .diamond { inset: 7px; }
      .indicator:focus-visible { outline: 1.5px solid var(--ink-bright); outline-offset: 4px; }
      .indicator[aria-expanded="true"] .diamond { background: var(--tint); }
      .indicator .tag {
        position: absolute;
        left: 50%;
        bottom: 100%;
        transform: translateX(-50%);
        padding: 3px 8px;
        white-space: nowrap;
        font-size: 9px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--ink-bright);
        background: rgba(5, 6, 14, 0.72);
        border: 1px solid color-mix(in srgb, var(--tint) 45%, transparent);
        opacity: 0;
        transition: opacity 140ms ease;
        pointer-events: none;
      }
      .indicator:hover .tag, .indicator:focus-visible .tag { opacity: 1; }

      @keyframes ping {
        0%   { opacity: 0.7; transform: rotate(45deg) scale(0.4); }
        70%  { opacity: 0;   transform: rotate(45deg) scale(1.5); }
        100% { opacity: 0;   transform: rotate(45deg) scale(1.5); }
      }

      /* ——— the chip: one card, one sentence ——— */
      #chip {
        position: fixed;
        z-index: 5;
        left: max(22px, env(safe-area-inset-left));
        bottom: max(22px, env(safe-area-inset-bottom));
        width: min(340px, calc(100vw - 44px));
        padding: 16px 18px 14px;
        background: rgba(7, 9, 20, 0.78);
        border: 1px solid color-mix(in srgb, var(--tint, #2de2ff) 50%, transparent);
        box-shadow:
          0 0 24px color-mix(in srgb, var(--tint, #2de2ff) 18%, transparent),
          inset 0 0 30px rgba(45, 226, 255, 0.03);
        backdrop-filter: blur(10px);
        transform: translateY(12px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }
      #chip.open { opacity: 1; transform: none; pointer-events: auto; }
      #chip .kind {
        font-size: 9px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--tint, var(--grid));
      }
      #chip h2 {
        margin: 7px 0 8px;
        font-size: 17px;
        font-weight: 500;
        letter-spacing: 0.12em;
        color: var(--ink-bright);
      }
      #chip p { font-size: 12px; line-height: 1.55; letter-spacing: 0.02em; color: var(--ink); }
      #chip .meter {
        margin-top: 12px;
        height: 3px;
        background: rgba(107, 123, 164, 0.25);
      }
      #chip .meter i {
        display: block;
        height: 100%;
        width: 0;
        background: var(--tint, var(--grid));
        box-shadow: 0 0 8px var(--tint, var(--grid));
        transition: width 320ms ease;
      }
      #chip .dismiss {
        margin-top: 10px;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: var(--ink-dim);
        text-transform: uppercase;
      }

      /* ——— portrait: this mode is horizontal ——— */
      #rotate-hint {
        position: fixed;
        inset: 0;
        z-index: 9;
        display: none;
        place-items: center;
        text-align: center;
        background: rgba(5, 6, 14, 0.92);
        letter-spacing: 0.3em;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--ink);
        line-height: 2.2;
      }
      @media (orientation: portrait) {
        #rotate-hint { display: grid; }
      }

      @media (prefers-reduced-motion: reduce) {
        .indicator .ring { animation: none; opacity: 0.25; transform: rotate(45deg) scale(1.1); }
        #chip { transition: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="Overhead view of the city, five mile radius. Pulsing clouds mark active areas."></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="hud hud-tl">
      <div class="wordmark">SIA</div>
      <div class="sub">Immersive · Seattle · R 5 MI</div>
      <div class="sub"><a href="./index.html">← Map</a></div>
    </header>

    <div class="hud hud-tr">
      <div id="clock" aria-live="off">--:--</div>
      <div class="sub" id="pulse-count">6 areas breathing</div>
    </div>

    <aside id="chip" role="dialog" aria-live="polite">
      <div class="kind"></div>
      <h2></h2>
      <p></p>
      <div class="meter"><i></i></div>
      <div class="dismiss">esc · or tap the city</div>
    </aside>

    <div id="rotate-hint">turn the screen sideways<br />the city is wide</div>

    <script type="module" src="./src/immersive.js"></script>
  </body>
</html>
