<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SIA — Immersive (mock)</title>
    <style>
      /* Immersive mode is a vibe mockup: self-contained on purpose, no
         styles.css coupling until the direction is locked. */
      :root {
        --void: #05060e;
        --panel: rgba(7, 9, 20, 0.72);
        --edge: rgba(45, 226, 255, 0.14);
        --ink-dim: #6b7ba4;
        --ink: #c9d6ff;
        --ink-bright: #eaf6ff;
        --grid: #2de2ff;
        --heat: #ff2f6d;
        --crowd: #ff9e3d;
        --gather: #8b5cff;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; overflow: hidden; }

      body {
        background: var(--void);
        color: var(--ink);
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        -webkit-font-smoothing: antialiased;
      }

      #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

      .vignette {
        position: fixed; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse 120% 90% at 50% 45%, transparent 55%, rgba(3, 4, 10, 0.85) 100%);
      }
      .scanlines {
        position: fixed; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(to bottom,
          rgba(180, 220, 255, 0.016) 0px, rgba(180, 220, 255, 0.016) 1px,
          transparent 1px, transparent 4px);
        mix-blend-mode: screen;
      }

      /* ——— rails ——— */
      .rail {
        position: fixed;
        top: 0;
        bottom: 0;
        z-index: 6;
        width: 250px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: max(18px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
        background: linear-gradient(to right, rgba(4, 5, 12, 0.88), rgba(4, 5, 12, 0.55));
        border-right: 1px solid var(--edge);
        backdrop-filter: blur(8px);
      }
      .rail-left { left: 0; }
      .rail-right {
        right: 0;
        background: linear-gradient(to left, rgba(4, 5, 12, 0.88), rgba(4, 5, 12, 0.55));
        border-right: none;
        border-left: 1px solid var(--edge);
      }

      .wordmark {
        color: var(--ink-bright);
        font-size: 17px;
        letter-spacing: 0.5em;
        text-shadow: 0 0 18px rgba(45, 226, 255, 0.55);
      }
      .sub { margin-top: 6px; color: var(--ink-dim); font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; }
      .sub a { color: var(--ink-dim); text-decoration: none; border-bottom: 1px solid rgba(107, 123, 164, 0.4); }
      .sub a:hover, .sub a:focus-visible { color: var(--ink-bright); outline: none; border-color: var(--ink-bright); }

      .rail-title {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--ink-dim);
        border-bottom: 1px solid var(--edge);
        padding-bottom: 8px;
      }

      /* ——— alerts ——— */
      #alerts { list-style: none; overflow-y: auto; scrollbar-width: none; flex: 1; }
      #alerts::-webkit-scrollbar { display: none; }
      .alert {
        width: 100%;
        display: block;
        background: none;
        border: 1px solid transparent;
        border-bottom: 1px solid rgba(107, 123, 164, 0.12);
        padding: 10px 8px;
        cursor: pointer;
        text-align: left;
        color: inherit;
        font: inherit;
        -webkit-tap-highlight-color: transparent;
      }
      .alert:hover { border-color: color-mix(in srgb, var(--tint) 35%, transparent); }
      .alert:focus-visible { outline: 1.5px solid var(--ink-bright); outline-offset: -1px; }
      .alert-row { display: flex; align-items: center; gap: 10px; }
      .alert .glyph {
        flex: none;
        width: 26px; height: 26px;
        display: grid; place-items: center;
        border: 1px solid var(--tint);
        border-radius: 50%;
        background: color-mix(in srgb, var(--tint) 12%, transparent);
        box-shadow: 0 0 8px color-mix(in srgb, var(--tint) 40%, transparent);
        color: var(--tint);
      }
      .alert .glyph svg { width: 13px; height: 13px; }
      .alert .who { flex: 1; min-width: 0; }
      .alert .name { display: block; font-size: 12px; letter-spacing: 0.1em; color: var(--ink-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .alert .kind { display: block; margin-top: 3px; font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--tint); }
      .alert .meter { flex: none; width: 34px; height: 3px; background: rgba(107, 123, 164, 0.25); }
      .alert .meter i { display: block; height: 100%; background: var(--tint); box-shadow: 0 0 6px var(--tint); }
      .alert .line {
        display: none;
        margin: 9px 2px 2px 36px;
        font-size: 11px;
        line-height: 1.55;
        color: var(--ink);
      }
      .alert[aria-expanded="true"] { border-color: color-mix(in srgb, var(--tint) 55%, transparent); background: color-mix(in srgb, var(--tint) 7%, transparent); }
      .alert[aria-expanded="true"] .line { display: block; }

      /* ——— voice rail ——— */
      #clock { color: var(--ink-bright); font-size: 15px; letter-spacing: 0.3em; text-align: right; }

      .orb-wrap { position: relative; height: 150px; display: grid; place-items: center; }
      .orb {
        position: relative;
        width: 84px; height: 84px; border-radius: 50%;
        background:
          radial-gradient(circle at 38% 34%, rgba(234, 246, 255, 0.85) 0%, rgba(45, 226, 255, 0.35) 22%, rgba(20, 90, 160, 0.25) 55%, transparent 72%),
          radial-gradient(circle, rgba(45, 226, 255, 0.18) 40%, transparent 70%);
        box-shadow: 0 0 34px rgba(45, 226, 255, 0.3), inset 0 0 22px rgba(45, 226, 255, 0.25);
        transition: transform 240ms ease, box-shadow 240ms ease;
      }
      .orb-ring {
        position: absolute;
        border: 1px solid rgba(45, 226, 255, 0.4);
        border-radius: 50%;
        inset: 0;
        animation: orb-ping 3.2s ease-out infinite;
        animation-delay: var(--d);
        pointer-events: none;
      }
      @keyframes orb-ping {
        0% { transform: scale(1); opacity: 0.5; }
        80%, 100% { transform: scale(1.75); opacity: 0; }
      }
      .voice[data-state="listening"] .orb {
        box-shadow: 0 0 46px rgba(45, 226, 255, 0.55), inset 0 0 26px rgba(45, 226, 255, 0.4);
        transform: scale(1.08);
      }
      .voice[data-state="listening"] .orb-ring { animation-duration: 1.1s; }
      .voice[data-state="speaking"] .orb { animation: orb-talk 340ms ease-in-out infinite; }
      @keyframes orb-talk {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      #voice-state {
        text-align: center;
        font-size: 9px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--ink-dim);
        min-height: 12px;
      }

      #transcript { list-style: none; flex: 1; overflow-y: auto; scrollbar-width: none; display: flex; flex-direction: column; gap: 10px; padding: 4px 2px; }
      #transcript::-webkit-scrollbar { display: none; }
      #transcript li {
        max-width: 92%;
        padding: 8px 10px;
        font-size: 11px;
        line-height: 1.5;
        border: 1px solid rgba(107, 123, 164, 0.25);
        color: var(--ink);
        background: rgba(12, 16, 34, 0.5);
      }
      #transcript li.you { align-self: flex-end; border-color: rgba(107, 123, 164, 0.35); color: var(--ink-dim); }
      #transcript li.sia {
        align-self: flex-start;
        border-color: rgba(45, 226, 255, 0.35);
        color: var(--ink-bright);
        box-shadow: 0 0 14px rgba(45, 226, 255, 0.08);
      }

      #mic {
        flex: none;
        padding: 12px;
        font: inherit;
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-bright);
        background: rgba(45, 226, 255, 0.08);
        border: 1px solid rgba(45, 226, 255, 0.4);
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #mic:hover { background: rgba(45, 226, 255, 0.14); }
      #mic:focus-visible { outline: 1.5px solid var(--ink-bright); outline-offset: 2px; }
      #mic.hot { background: rgba(45, 226, 255, 0.22); box-shadow: 0 0 22px rgba(45, 226, 255, 0.3); }

      /* ——— indicators on the city ——— */
      .indicator {
        position: fixed;
        top: 0; left: 0;
        z-index: 3;
        width: 40px; height: 40px;
        margin: -20px 0 0 -20px;
        display: grid; place-items: center;
        background: none; border: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .indicator .badge {
        width: 26px; height: 26px;
        display: grid; place-items: center;
        border: 1.5px solid var(--tint);
        border-radius: 50%;
        color: var(--tint);
        background: rgba(5, 6, 14, 0.72);
        box-shadow: 0 0 12px color-mix(in srgb, var(--tint) 65%, transparent);
        transition: transform 140ms ease;
      }
      .indicator .badge svg { width: 13px; height: 13px; }
      .indicator:hover .badge, .indicator:focus-visible .badge { transform: scale(1.18); }
      .indicator:focus-visible { outline: 1.5px solid var(--ink-bright); outline-offset: 2px; border-radius: 50%; }
      .indicator[aria-expanded="true"] .badge { background: var(--tint); color: #05060e; }
      .indicator .ring {
        position: absolute; inset: 4px;
        border: 1px solid var(--tint);
        border-radius: 50%;
        opacity: 0;
        animation: ping 2.6s ease-out infinite;
        animation-delay: var(--phase);
        pointer-events: none;
      }
      @keyframes ping {
        0% { opacity: 0.7; transform: scale(0.5); }
        70%, 100% { opacity: 0; transform: scale(1.6); }
      }
      .indicator .tag {
        position: absolute; left: 50%; bottom: 100%;
        transform: translateX(-50%);
        padding: 3px 8px;
        white-space: nowrap;
        font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
        color: var(--ink-bright);
        background: rgba(5, 6, 14, 0.72);
        border: 1px solid color-mix(in srgb, var(--tint) 45%, transparent);
        opacity: 0; transition: opacity 140ms ease;
        pointer-events: none;
      }
      .indicator:hover .tag, .indicator:focus-visible .tag { opacity: 1; }

      /* ——— portrait ——— */
      #rotate-hint {
        position: fixed; inset: 0; z-index: 9;
        display: none; place-items: center; text-align: center;
        background: rgba(5, 6, 14, 0.92);
        letter-spacing: 0.3em; font-size: 11px; text-transform: uppercase;
        color: var(--ink); line-height: 2.2;
      }
      @media (orientation: portrait) { #rotate-hint { display: grid; } }

      @media (max-width: 1000px) {
        .rail { width: 210px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .indicator .ring, .orb-ring { animation: none; opacity: 0.25; }
        .voice[data-state="speaking"] .orb { animation: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="Overhead view of the city, five mile radius. Pulsing clouds mark active areas."></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <aside class="rail rail-left">
      <header>
        <div class="wordmark">SIA</div>
        <div class="sub">Immersive · Seattle · R 5 MI</div>
        <div class="sub"><a href="./index.html">← Map</a></div>
      </header>
      <h2 class="rail-title">Alerts · <span id="alert-count"></span></h2>
      <ol id="alerts"></ol>
    </aside>

    <aside class="rail rail-right voice" data-state="idle">
      <div id="clock" aria-live="off">--:--</div>
      <div class="orb-wrap" aria-hidden="true">
        <span class="orb-ring" style="--d: 0s"></span>
        <span class="orb-ring" style="--d: 1.1s"></span>
        <span class="orb-ring" style="--d: 2.2s"></span>
        <div class="orb"></div>
      </div>
      <div id="voice-state">idle</div>
      <ol id="transcript" aria-live="polite"></ol>
      <button id="mic">Hold to talk</button>
    </aside>

    <div id="rotate-hint">turn the screen sideways<br />the city is wide</div>

    <script type="module" src="./src/immersive.js"></script>
  </body>
</html>
