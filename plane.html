<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIA — plane prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-stage" aria-label="Live city intuition map">
        <div class="top-bar">
          <div>
            <p class="eyebrow">SIA</p>
            <h1>Ambient route intelligence <a class="map-switch" href="./index.html">real map ▸</a></h1>
          </div>
          <div id="statusPill" class="status-pill" role="status">
            <span id="statusDot" class="live-dot connecting" aria-hidden="true"></span>
            <span id="statusText">Connecting to Seattle feeds…</span>
          </div>
        </div>

        <div class="map-wrap">
          <div id="cityMap" class="city-map" role="application" aria-label="Mock city map">
            <svg class="base-map" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <pattern id="minorGrid" width="10" height="10" patternUnits="userSpaceOnUse">
                  <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(31, 41, 55, 0.08)" stroke-width="0.7" />
                </pattern>
              </defs>
              <rect width="100" height="100" fill="url(#minorGrid)" />
              <path class="river" d="M -4 76 C 16 68, 28 78, 44 68 S 72 55, 104 62" />
              <path class="arterial" d="M 6 64 C 24 58, 42 55, 58 54 S 80 56, 94 60" />
              <path class="arterial" d="M 8 37 C 30 29, 50 24, 73 29 S 88 34, 96 38" />
              <path class="arterial vertical" d="M 50 8 C 48 28, 52 47, 51 64 S 46 83, 48 96" />
              <path class="road" d="M 18 12 L 20 88" />
              <path class="road" d="M 34 8 L 39 91" />
              <path class="road" d="M 68 10 L 63 92" />
              <path class="road" d="M 82 13 L 86 87" />
              <path class="road" d="M 9 22 L 92 18" />
              <path class="road" d="M 10 48 L 91 43" />
              <path class="road" d="M 8 83 L 92 79" />
              <circle class="venue" cx="72" cy="34" r="4.5" />
              <rect class="downtown" x="42" y="45" width="22" height="20" rx="2" />
            </svg>
            <svg id="routeLayer" class="route-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
            <div id="heatLayer" class="heat-layer" aria-hidden="true"></div>
            <div id="avoidLayer" class="avoid-layer" aria-hidden="true"></div>
            <div id="mapHint" class="map-hint hidden">Click the map to place an avoid zone</div>
            <div id="companion" class="companion" role="dialog" aria-label="Companion">
              <div class="companion-head">
                <p id="companionPrompt" class="companion-prompt">Where are we going?</p>
                <button id="companionDismiss" class="companion-dismiss" type="button" aria-label="Dismiss">✕</button>
              </div>
              <div id="companionChips" class="companion-chips"></div>
            </div>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Prototype controls">
        <section class="panel-section guidance-section">
          <div class="section-heading inline">
            <div>
              <p class="eyebrow">Route read</p>
              <h2 id="guidanceTitle">Calmer north route</h2>
            </div>
            <button id="companionReopen" class="text-button hidden" type="button">Where to?</button>
          </div>
          <p id="guidanceSummary" class="guidance-copy"></p>
          <div id="routeCards" class="route-cards"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading inline">
            <div>
              <p class="eyebrow">Personal layer</p>
              <h2>Avoid zones</h2>
            </div>
            <button id="addAvoidButton" class="icon-button" type="button" aria-pressed="false" title="Add avoid zone">+</button>
          </div>
          <label class="field-label" for="avoidLabel">Zone label</label>
          <input id="avoidLabel" class="text-input" value="Personal avoid" />
          <div id="avoidList" class="avoid-list"></div>
          <button id="clearAvoidButton" class="text-button" type="button">Clear avoid zones</button>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Layers</p>
          <label class="toggle-row">
            <input id="trafficToggle" type="checkbox" checked />
            <span>Traffic and slow corridors</span>
          </label>
          <label class="toggle-row">
            <input id="eventsToggle" type="checkbox" checked />
            <span>Events and crowding</span>
          </label>
          <label class="toggle-row">
            <input id="safetyToggle" type="checkbox" checked />
            <span>Safety and commotion</span>
          </label>
          <button id="refreshButton" class="primary-button" type="button">Refresh signals</button>
        </section>

        <section class="panel-section source-section">
          <p class="eyebrow">Sources</p>
          <ul id="sourceList"></ul>
        </section>
      </aside>
    </main>

    <script src="./demo-config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
